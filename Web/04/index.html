<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coppel</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="style.css">
</head>
<body onload="calcular()">
    <img src="img/Coopel.png" alt="" srcset="" width="200">
    <h1>CREDICOPPEL</h1>
    <hr>
    <h4>Producto:</h4>
    <br>
    <select id="producto" onchange="calcular()">
        <option value="TV">TV</option>
        <option value="Comedor">Comedor</option>
        <option value="Lavadora">Lavadora</option>
        <option value="Moto">Moto</option>
        <option value="Sala">Sala</option>
    </select>
    <div id="img"></div>
    <div id="precio">Precio: $ 0.00 MNX</div>
    <hr>
    <h3>Plazo</h3>
    <input type="radio" name="plazo" id="uno" onchange="calcular()" checked> 6 Meses (+10%) 
    <br>
    <input type="radio" name="plazo" id="dos" onchange="calcular()"> 12 Meses (+15%) 
    <br>
    <input type="radio" name="plazo" id="tres" onchange="calcular()"> 18 Meses (+20%) 
    <br>
    <br>
    <h3>Cantidad</h3>
    <input type="number"  id="cantidad" value="1" min="1" max="10" onchange="calcular()">
    <br>
    <br>
    <div id="contado">Precio de contado: $ 0.0 MXN</div>
    <div id="credito">Precio a credito: $ 0.0 MXN</div>
    <div id="abono">Abono mensual: $ 0.0 MXN</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
