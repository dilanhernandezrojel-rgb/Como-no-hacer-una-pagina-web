            <!-- Agrupación -->
    <fieldset>
        <legend>Datos personales</legend>

        <!-- Texto -->
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

        <br><br>

        <!-- Email -->
        <label for="email">Correo:</label>
        <input type="email" id="email" name="email" required>

        <br><br>

        <!-- Password -->
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password">

        <br><br>

        <!-- Teléfono -->
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono">

        <br><br>

        <!-- Número -->
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="1" max="120">

        <br><br>

        <!-- Fecha -->
        <label for="fecha">Fecha de nacimiento:</label>
        <input type="date" id="fecha" name="fecha">

        <br><br>

        <!-- Hora -->
        <label for="hora">Hora preferida:</label>
        <input type="time" id="hora" name="hora">

        <br><br>

        <!-- Color -->
        <label for="color">Color favorito:</label>
        <input type="color" id="color" name="color">

        <br><br>

        <!-- Rango -->
        <label for="rango">Nivel:</label>
        <input type="range" id="rango" name="rango" min="0" max="10">

    </fieldset>

    <br>

    <!-- Radio buttons -->
    <p>Género:</p>
    <input type="radio" id="hombre" name="genero" value="hombre">
    <label for="hombre">Hombre</label>

    <input type="radio" id="mujer" name="genero" value="mujer">
    <label for="mujer">Mujer</label>

    <br><br>

    <!-- Checkbox -->
    <p>Intereses:</p>
    <input type="checkbox" id="html" name="intereses" value="html">
    <label for="html">HTML</label>

    <input type="checkbox" id="css" name="intereses" value="css">
    <label for="css">CSS</label>

    <input type="checkbox" id="js" name="intereses" value="js">
    <label for="js">JavaScript</label>

    <br><br>

    <!-- Select -->
    <label for="pais">País:</label>
    <select id="pais" name="pais">
        <optgroup label="América">
        <option value="mexico">México</option>
        <option value="argentina">Argentina</option>
        </optgroup>
        <optgroup label="Europa">
        <option value="espana">España</option>
        </optgroup>
    </select>

    <br><br>

    <!-- Datalist -->
    <label for="navegador">Navegador:</label>
    <input list="navegadores" id="navegador" name="navegador">
    <datalist id="navegadores">
        <option value="Chrome">
        <option value="Firefox">
        <option value="Edge">
    </datalist>

    <br><br>

    <!-- Textarea -->
    <label for="mensaje">Mensaje:</label><br>
    <textarea id="mensaje" name="mensaje" rows="4" cols="40"></textarea>

    <br><br>

    <!-- Archivo -->
    <label for="archivo">Subir archivo:</label>
    <input type="file" id="archivo" name="archivo">

    <br><br>

    <!-- Barra de progreso -->
    <label>Progreso:</label>
    <progress value="50" max="100"></progress>

    <br><br>

    <!-- Medidor -->
    <label>Medidor:</label>
    <meter value="0.6">60%</meter>

    <br><br>

            <!-- Botones -->
        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
